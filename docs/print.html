<script>
(async () => {
  /** @param {string} s */
  const text2arr = s => new Int32Array(Uint8Array.from(atob(s.replaceAll('-', '+').replaceAll('_', '/')), x => x.charCodeAt(0)).buffer);
  /** @param {ArrayBuffer} s */
  const buffer2text = s => btoa(String.fromCharCode(...new Uint8Array(s))).replaceAll('+', '-').replaceAll('/', '_').replaceAll('=', '');

  const token = new URL(location.href).searchParams.get('token') ?? localStorage.getItem('token');
  if (!token || !/^[0-9A-Za-z_-]{43}$/.test(token)) return;
  const tokenarr = text2arr(token);
  const saltarr = text2arr('LkoYI4ykg1QuSaqsYfqnc3VnTbrnxluxZXo_YbtLN6I');
  const key = new Int32Array(16);
  for (let i = 0; i < 8; ++i) {
    key[i] = tokenarr[i];
    key[i + 8] = saltarr[i];
  }
  const check = buffer2text(await crypto.subtle.digest('SHA-256', key));
  console.log(check);
  if (check !== '8DpM3OjpmG9QStjvpJKx8t_DTi7DWNrcmGf3dkTeb4g') return;

  localStorage.setItem('token', token);
